<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===== SEO META TAGS ===== -->
  <title>Blogs - Business Growth, Websites, Marketing & Digital Insights</title>
  <meta name="description" content="Explore expert insights, website strategies, digital marketing guides, business growth tips, branding ideas, and practical resources designed to help businesses grow online. Discover actionable content from Solvoro." />
  <meta name="keywords" content="business growth, website development, digital marketing, branding, SEO, content marketing, startup growth, small business, Solvoro blog" />
  <link rel="canonical" href="https://solvoro.com/blog" />

  <!-- Open Graph -->
  <meta property="og:title" content="Just Blogs" />
  <meta property="og:description" content="Practical insights, digital strategies, and business growth resources for modern businesses." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://solvoro.com/blog" />
  <meta property="og:image" content="https://solvoro.com/og-image.jpg" />
  <meta property="og:site_name" content="Just Blogs" />

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Just Blogs" />
  <meta name="twitter:description" content="Expert business, marketing, and website insights from Solvoro." />
  <meta name="twitter:image" content="https://solvoro.com/og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <style>
    /* -------- Reset & Base -------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* -------- Header – Apple-style (logo left, search right) -------- */
    .site-header {
      padding: 16px 24px;
      background: rgba(15, 15, 15, 0.6);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .site-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0;
    }

    /* Logo – larger (44px) */
    .logo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 8px 24px rgba(0, 0, 0, 0.4);
      display: block;
      transition: transform 0.2s ease;
    }

    .logo img:hover {
      transform: scale(1.05);
    }

    /* Search Bar – slightly larger */
    .search-wrapper {
      max-width: 300px;
      width: 100%;
      position: relative;
      flex-shrink: 1;
    }

    .search-wrapper input {
      width: 100%;
      padding: 10px 18px 10px 42px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      color: #e5e7eb;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      outline: none;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
    }

    .search-wrapper input::placeholder {
      color: #6b7280;
      font-weight: 400;
    }

    .search-wrapper input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(96, 165, 250, 0.3);
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.05), inset 0 1px 2px rgba(0,0,0,0.4);
    }

    .search-wrapper .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7280;
      pointer-events: none;
      opacity: 0.7;
    }

    .search-wrapper .search-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* -------- Category Bar (no border) -------- */
    .category-bar {
      padding: 28px 24px 12px;
      background: transparent;
    }

    .category-bar .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0;
    }

    .category-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .category-chip {
      padding: 8px 22px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      color: #9ca3af;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 0.85rem;
      font-weight: 450;
      letter-spacing: 0.02em;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .category-chip:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: #e5e7eb;
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }

    .category-chip.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.25);
    }

    /* -------- Blog Grid – premium card design -------- */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 36px;
      margin: 40px 0 60px;
    }

    .blog-card {
      background: #161616;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .blog-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.10);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.02);
      background: #1a1a1a;
    }

    .blog-card-image {
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
      flex-shrink: 0;
    }

    .blog-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .blog-card:hover .blog-card-image img {
      transform: scale(1.04);
    }

    .blog-card-body {
      padding: 22px 24px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .blog-card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 14px;
      font-size: 0.75rem;
      color: #6b7280;
      letter-spacing: 0.01em;
      margin-bottom: 12px;
    }

    .blog-card-meta .dot {
      color: #3a3a3a;
    }

    .blog-card-meta .category-tag {
      color: #60a5fa;
      font-weight: 450;
      background: rgba(96, 165, 250, 0.08);
      padding: 0 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      border: 1px solid rgba(96, 165, 250, 0.10);
    }

    .blog-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.35;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
      transition: color 0.2s;
    }

    .blog-card:hover .blog-card-title {
      color: #60a5fa;
    }

    .blog-card-excerpt {
      font-size: 0.95rem;
      color: #9ca3af;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
      margin-bottom: 16px;
    }

    .blog-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 0.8rem;
      color: #6b7280;
    }

    .blog-card-footer .likes {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .blog-card-footer .likes svg {
      width: 16px;
      height: 16px;
      stroke: #6b7280;
      fill: none;
    }

    .blog-card-footer .read-more {
      color: #9ca3af;
      font-weight: 450;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .blog-card-footer .read-more:hover {
      color: #ffffff;
    }

    .blog-card-footer .read-more svg {
      width: 14px;
      height: 14px;
      transition: transform 0.2s;
    }

    .blog-card-footer .read-more:hover svg {
      transform: translateX(4px);
    }

    /* -------- Empty state -------- */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #6b7280;
    }

    .empty-state svg {
      opacity: 0.3;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 1.1rem;
    }

    /* -------- Footer – horizontal on all devices -------- */
    .site-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding: 32px 24px;
      background: #0a0a0a;
      margin-top: 16px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: nowrap;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .footer-brand img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .footer-brand span {
      font-weight: 600;
      font-size: 1rem;
      color: #f0f0f0;
      white-space: nowrap;
    }

    .footer-links {
      display: flex;
      flex-wrap: nowrap;
      gap: 18px 28px;
      flex-shrink: 0;
    }

    .footer-links a {
      color: #9ca3af;
      font-size: 0.85rem;
      transition: color 0.2s;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .footer-links a:hover {
      color: #ffffff;
    }

    .footer-copy {
      color: #6b7280;
      font-size: 0.8rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* -------- Responsive -------- */
    @media (max-width: 768px) {
      .site-header {
        padding: 12px 16px;
      }
      .site-header .container {
        gap: 10px;
      }
      .logo img {
        width: 36px;
        height: 36px;
      }
      .search-wrapper {
        max-width: 200px;
      }
      .search-wrapper input {
        font-size: 0.85rem;
        padding: 8px 14px 8px 36px;
      }
      .search-wrapper .search-icon svg {
        width: 16px;
        height: 16px;
      }

      .category-bar {
        padding: 20px 16px 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .category-filter {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 6px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .category-filter::-webkit-scrollbar {
        display: none;
      }
      .category-chip {
        flex-shrink: 0;
        font-size: 0.75rem;
        padding: 6px 16px;
      }

      .blog-grid {
        grid-template-columns: 1fr;
        gap: 28px;
        margin: 28px 0 40px;
      }
      .blog-card-body {
        padding: 18px 20px 20px;
      }
      .blog-card-title {
        font-size: 1.1rem;
      }

      /* Footer stays horizontal */
      .footer-inner {
        flex-wrap: nowrap;
        gap: 12px;
      }
      .footer-brand span {
        font-size: 0.85rem;
      }
      .footer-links {
        gap: 10px 16px;
      }
      .footer-links a {
        font-size: 0.75rem;
      }
      .footer-copy {
        font-size: 0.7rem;
      }
    }

    @media (max-width: 580px) {
      .footer-links {
        gap: 6px 12px;
      }
      .footer-links a {
        font-size: 0.7rem;
      }
      .footer-copy {
        font-size: 0.65rem;
      }
      .footer-brand img {
        width: 22px;
        height: 22px;
      }
      .footer-brand span {
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      .search-wrapper {
        max-width: 140px;
      }
      .search-wrapper input {
        font-size: 0.75rem;
        padding: 6px 10px 6px 30px;
      }
      .search-wrapper .search-icon {
        left: 8px;
      }
      .search-wrapper .search-icon svg {
        width: 14px;
        height: 14px;
      }
      /* Hide some footer links on very small screens */
      .footer-links a:nth-child(3),
      .footer-links a:nth-child(4) {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container">
      <!-- Left: Clickable Logo (goes to index.html) -->
      <a href="/" class="logo" aria-label="Homepage">
        <img src="logo.png" alt="Solvoro" onerror="this.style.display='none'" />
        <span class="logo-text" style="display:none;">Solvoro<span>.</span></span>
      </a>

      <!-- Right: Search Bar -->
      <div class="search-wrapper">
        <span class="search-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </span>
        <input type="text" id="searchInput" placeholder="Search articles…" aria-label="Search articles" />
      </div>
    </div>
  </header>

  <!-- ===== CATEGORY BAR ===== -->
  <nav class="category-bar" aria-label="Categories">
    <div class="container">
      <div id="categoryFilter" class="category-filter">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="container">
    <div id="blogGrid" class="blog-grid"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor"/>
        <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor"/>
      </svg>
      <p>No articles found.</p>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="logo.png" alt="Solvoro" onerror="this.style.display='none'" />
        <span>Solvoro</span>
      </div>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
      </div>
      <div class="footer-copy">
        &copy; 2026 Solvoro
      </div>
    </div>
  </footer>

  <!-- ===== FIREBASE & APP SCRIPT ===== -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, getDocs, query, where } from "firebase/firestore";

    // ---------- Firebase Config ----------
    const firebaseConfig = {
      apiKey: "AIzaSyDH_8Htk4dhn_Hwq3YLNE_pkqOzfGagwKU",
      authDomain: "solvoro-blog.firebaseapp.com",
      projectId: "solvoro-blog",
      storageBucket: "solvoro-blog.firebasestorage.app",
      messagingSenderId: "580783342095",
      appId: "1:580783342095:web:64602b1f1125ae4e42d97a",
      measurementId: "G-EEF5H8F45S"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ---------- Helpers ----------
    function formatDate(timestamp) {
      if (!timestamp) return '—';
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function readingTime(html) {
      if (!html) return 1;
      const text = html.replace(/<[^>]*>/g, '').trim();
      const words = text.split(/\s+/).length;
      return Math.max(1, Math.ceil(words / 200));
    }

    // ---------- Load Categories ----------
    async function loadCategories() {
      const snap = await getDocs(collection(db, 'categories'));
      const cats = [];
      snap.forEach(doc => cats.push({ id: doc.id, ...doc.data() }));
      cats.sort((a, b) => a.name.localeCompare(b.name));
      return cats;
    }

    // ---------- Load Published Blogs ----------
    async function loadBlogs(categorySlug = null) {
      const q = query(collection(db, 'blogs'), where('published', '==', true));
      const snap = await getDocs(q);
      const blogs = [];
      snap.forEach(doc => blogs.push({ id: doc.id, ...doc.data() }));

      if (categorySlug) {
        return blogs.filter(b => b.category === categorySlug);
      }

      blogs.sort((a, b) => {
        const dateA = a.createdAt?.toDate?.() || new Date(0);
        const dateB = b.createdAt?.toDate?.() || new Date(0);
        return dateB - dateA;
      });
      return blogs;
    }

    // ---------- Render Blogs ----------
    function renderBlogs(blogs) {
      const grid = document.getElementById('blogGrid');
      const empty = document.getElementById('emptyState');
      if (!grid) return;

      if (!blogs || blogs.length === 0) {
        grid.innerHTML = '';
        if (empty) empty.style.display = 'block';
        return;
      }
      if (empty) empty.style.display = 'none';

      grid.innerHTML = blogs.map(blog => `
        <a href="post.html?slug=${blog.slug}" class="blog-card">
          <div class="blog-card-image">
            ${blog.image ? `<img src="${blog.image}" alt="${blog.title}" loading="lazy" />` : ''}
          </div>
          <div class="blog-card-body">
            <div class="blog-card-meta">
              <span>${formatDate(blog.createdAt)}</span>
              <span class="dot">·</span>
              <span>${readingTime(blog.content)} min read</span>
              ${blog.category ? `<span class="category-tag">${blog.category}</span>` : ''}
            </div>
            <h2 class="blog-card-title">${blog.title}</h2>
            <p class="blog-card-excerpt">${blog.description || ''}</p>
            <div class="blog-card-footer">
              <span class="likes">
                <svg viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                ${blog.likes || 0}
              </span>
              <span class="read-more">
                Read <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </span>
            </div>
          </div>
        </a>
      `).join('');
    }

    // ---------- Render Category Chips ----------
    function renderCategories(categories, currentCategory = null) {
      const container = document.getElementById('categoryFilter');
      if (!container) return;

      let html = `<button class="category-chip ${!currentCategory ? 'active' : ''}" data-slug="">All</button>`;
      categories.forEach(cat => {
        const active = currentCategory === cat.slug ? 'active' : '';
        html += `<button class="category-chip ${active}" data-slug="${cat.slug}">${cat.name}</button>`;
      });
      container.innerHTML = html;

      container.querySelectorAll('.category-chip').forEach(btn => {
        btn.addEventListener('click', async () => {
          const slug = btn.dataset.slug;
          container.querySelectorAll('.category-chip').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const filtered = await loadBlogs(slug || null);
          renderBlogs(filtered);
          allBlogs = filtered;
        });
      });
    }

    // ---------- Search ----------
    let allBlogs = [];
    const searchInput = document.getElementById('searchInput');

    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      const filtered = allBlogs.filter(b =>
        b.title?.toLowerCase().includes(term) ||
        b.description?.toLowerCase().includes(term)
      );
      renderBlogs(filtered);
    });

    // ---------- Bootstrap ----------
    const categories = await loadCategories();
    const blogs = await loadBlogs();
    allBlogs = blogs;
    renderBlogs(blogs);
    renderCategories(categories);

    // ---------- Fix fallback logo display ----------
    document.querySelectorAll('.logo img, .footer-brand img').forEach(img => {
      img.addEventListener('error', function() {
        this.style.display = 'none';
        const fallback = this.parentElement.querySelector('.logo-text');
        if (fallback) fallback.style.display = 'inline';
      });
    });
  </script>
</body>
</html>
