<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solvoro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .app {
      width: 100%;
      max-width: 900px;
      height: 92vh;
      background: #111827;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #243041;
    }
    .topbar {
      padding: 16px 18px;
      background: #0b1220;
      border-bottom: 1px solid #243041;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
    }
    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bot {
      align-self: flex-start;
      background: #1f2937;
      color: #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid #243041;
      background: #0b1220;
    }
    input {
      flex: 1;
      border: 1px solid #334155;
      outline: none;
      background: #111827;
      color: white;
      border-radius: 12px;
      padding: 14px 14px;
      font-size: 15px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Solvoro</div>
      <div class="subtitle">Mohit — AI business assistant</div>
    </div>

    <div class="chat" id="chat">
      <div class="msg bot">Hello! I’m Mohit from Solvoro. How can I help you today?</div>
    </div>

    <div class="input-area">
      <input id="messageInput" type="text" placeholder="Type a message..." />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";
      sendBtn.disabled = true;
      const typing = addMessage("Typing...", "bot");

      try {
        const res = await fetch("http://127.0.0.1:8000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        typing.remove();
        addMessage(data.reply || "No reply received.", "bot");
      } catch (err) {
        typing.remove();
        addMessage("Backend not connected. Start server.py first.", "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
